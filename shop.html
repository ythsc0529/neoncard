<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹牌 - 商店與抽獎</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/userProfile.js"></script>
    <script src="js/data/characters_part1.js"></script>
    <script src="js/data/characters_part2.js"></script>
    <script src="js/data/characters_part3.js"></script>
    <script src="js/data/characters_part4.js"></script>
    <script src="js/data/characters_part5.js"></script>
    <script src="js/data/characters_part6.js"></script>
    <script src="js/data/characters.js"></script>
    <script src="js/ui/shop.js" defer></script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0F0F23 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .shop-page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--neon-cyan);
            text-decoration: none;
            font-family: var(--font-heading);
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            text-shadow: 0 0 10px var(--neon-cyan);
            transform: translateX(-3px);
        }

        .currency-bar {
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px 16px;
        }

        .currency-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-family: var(--font-heading);
        }
        
        .c-money { color: var(--neon-gold); }
        .c-deed { color: #ff6b35; }
        .c-t1 { color: #aaaaaa; }
        .c-t2 { color: var(--neon-cyan); }
        .c-t3 { color: var(--neon-magenta); }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--glass-border);
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-heading);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: var(--neon-cyan);
        }

        .tab-btn.active::after {
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* Shop Grid */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .shop-item:hover {
            border-color: var(--neon-gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.1);
        }

        .shop-item-title {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .shop-item-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
            min-height: 40px;
        }

        .shop-item-limit {
            font-size: 0.75rem;
            color: var(--neon-pink);
            margin-bottom: 10px;
        }

        .btn-buy {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 1rem;
            padding: 10px;
        }

        /* Gacha Pools Layout */
        .gacha-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .gacha-container {
                grid-template-columns: 1fr;
            }
        }

        .pool-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pool-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .pool-btn:hover {
            border-color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
        }

        .pool-btn.active {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            background: rgba(0, 243, 255, 0.1);
        }

        .pool-title {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .pool-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .gacha-display {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .gacha-banner {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(74, 134, 232, 0.2), rgba(153, 0, 255, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 24px;
            text-shadow: 0 0 20px currentColor;
        }

        .gacha-rates {
            width: 100%;
            margin-bottom: 20px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
        }

        .gacha-actions {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .btn-pull {
            padding: 15px 40px;
            font-size: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: 180px;
        }

        .btn-pull .cost {
            font-size: 0.85rem;
            opacity: 0.8;
            font-family: var(--font-main);
        }

        /* Gacha Animation Modal */
        #gachaAnimModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .gacha-results-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            padding: 20px;
            perspective: 1000px;
        }

        .gacha-card-wrap {
            width: 160px;
            height: 240px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            cursor: pointer;
        }

        .gacha-card-wrap.flipped {
            transform: rotateY(180deg);
        }

        .gacha-card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .gacha-card-back {
            background: linear-gradient(135deg, #2a2a4a, #1a1a2e);
            border: 2px solid var(--neon-cyan);
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0, rgba(255,255,255,0.02) 10px, transparent 10px, transparent 20px);
        }

        .gacha-card-front {
            background: #222;
            transform: rotateY(180deg);
            border: 2px solid #fff;
        }

        .gacha-card-front img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .gacha-card-front .name {
            font-weight: bold;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .gacha-card-front .dupe-tag {
            font-size: 0.75rem;
            color: var(--neon-gold);
            background: rgba(255,215,0,0.1);
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: auto;
        }

        /* Rarity colors */
        .rarity-common { border-color: #ffffff; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .rarity-rare { border-color: #4a86e8; box-shadow: 0 0 15px rgba(74,134,232,0.4); }
        .rarity-epic { border-color: #9900ff; box-shadow: 0 0 15px rgba(153,0,255,0.4); text-shadow: 0 0 5px #9900ff; }
        .rarity-legendary { border-color: #fbbc04; box-shadow: 0 0 20px rgba(251,188,4,0.5); text-shadow: 0 0 5px #fbbc04; }
        .rarity-mythic { border-color: #ff0000; box-shadow: 0 0 25px rgba(255,0,0,0.6); text-shadow: 0 0 8px #ff0000; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(255,0,0,0.4); }
            50% { box-shadow: 0 0 35px rgba(255,0,0,0.8); }
            100% { box-shadow: 0 0 15px rgba(255,0,0,0.4); }
        }

        .skip-btn {
            margin-top: 30px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
        }
        
        .skip-btn:hover { color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>

<body>
    <div id="pageLoading" style="position:fixed;inset:0;background:#0F0F23;display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div class="neon-text" style="color:var(--neon-cyan);font-family:var(--font-heading);font-size:1.5rem;animation:pulse 1.5s infinite;">載入中...</div>
    </div>

    <div class="shop-page" id="shopPage" style="display:none;">
        <div class="header-row">
            <a href="index.html" class="back-btn">← 返回主選單</a>
            <div class="currency-bar">
                <div class="currency-item c-money" title="錢錢">💰 <span id="v-money">0</span></div>
                <div class="currency-item c-deed" title="地契">📜 <span id="v-deed">0</span></div>
                <div class="currency-item" style="width:1px;background:var(--glass-border);height:16px;margin:0 5px;"></div>
                <div class="currency-item c-t1" title="普通抽獎券">🎟️ <span id="v-ticket-normal">0</span></div>
                <div class="currency-item c-t2" title="高級抽獎券">🌟 <span id="v-ticket-premium">0</span></div>
                <div class="currency-item c-t3" title="特殊抽獎券">✨ <span id="v-ticket-special">0</span></div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('gacha')" id="tab-gacha">機率抽獎</button>
            <button class="tab-btn" onclick="switchTab('shop')" id="tab-shop">資源商店</button>
        </div>

        <!-- Gacha Section -->
        <div class="tab-content active" id="content-gacha">
            <div class="gacha-container">
                <div class="pool-list" id="poolList">
                    <!-- Injected via JS -->
                </div>
                <div class="gacha-display">
                    <div class="gacha-banner" id="poolBanner">
                        ✨ 選擇獎池
                    </div>
                    <div class="gacha-rates" id="poolDesc">
                        請從左側選擇一個獎池來查看詳情。
                    </div>
                    <div class="gacha-actions" id="poolActions" style="display:none;">
                        <button class="btn btn-pull" id="btnPull1" onclick="performPull(1)">
                            單次抽取
                            <span class="cost" id="costPull1">-</span>
                        </button>
                        <button class="btn btn-gold btn-pull" id="btnPull10" onclick="performPull(10)">
                            十連抽取
                            <span class="cost" id="costPull10">-</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Shop Section -->
        <div class="tab-content" id="content-shop">
            <div class="shop-grid" id="shopGrid">
                <!-- Injected via JS -->
            </div>
        </div>

    </div>

    <!-- Gacha Animation Modal -->
    <div id="gachaAnimModal">
        <div style="color:white;font-size:1.5rem;font-family:var(--font-heading);margin-bottom:20px;letter-spacing:2px;" id="gachaAnimTitle">正在抽取...</div>
        <div class="gacha-results-grid" id="gachaResults"></div>
        <button class="skip-btn" id="btnSkipAnim" onclick="skipAnim()">點擊翻開全部 / 離開</button>
    </div>

</body>
</html>
