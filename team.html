<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹牌 - 隊伍配置與圖鑑</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/userProfile.js"></script>
    <script src="js/data/characters_part1.js"></script>
    <script src="js/data/characters_part2.js"></script>
    <script src="js/data/characters_part3.js"></script>
    <script src="js/data/characters_part4.js"></script>
    <script src="js/data/characters_part5.js"></script>
    <script src="js/data/characters_part6.js"></script>
    <script src="js/data/characters.js"></script>
    <style>
        body {
            background: #0F0F23;
            min-height: 100vh;
            color: var(--text-primary);
        }

        .team-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--neon-magenta);
            text-decoration: none;
            font-family: var(--font-heading);
            transition: all 0.2s;
        }

        .back-btn:hover {
            text-shadow: 0 0 10px var(--neon-magenta);
            transform: translateX(-3px);
        }

        .stats-bar {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 20px;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            color: var(--neon-cyan);
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover { color: white; border-color: rgba(255,255,255,0.3); }
        .filter-btn.active { background: rgba(0, 243, 255, 0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .character-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 180px;
        }

        .character-card.locked {
            opacity: 0.5;
            filter: grayscale(80%);
            border-style: dashed;
        }

        .character-card.glass {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .character-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .character-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .character-id {
            color: var(--text-secondary);
        }

        .character-rarity {
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .character-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            margin: 4px 0;
            font-family: var(--font-heading);
        }

        .character-stats {
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-label {
            font-weight: bold;
        }

        .stat-hp { color: #ff6b6b; }
        .stat-atk { color: #ffd93d; }

        .character-skills {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 8px;
        }

        .skill-item {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .skill-name {
            color: var(--neon-cyan);
            font-weight: bold;
        }

        .rarity-common { border-color: #ffffff; color: #ffffff; }
        .rarity-rare { border-color: #4a86e8; color: #4a86e8; }
        .rarity-epic { border-color: #9900ff; color: #9900ff; }
        .rarity-legendary { border-color: #fbbc04; color: #fbbc04; }
        .rarity-mythic { border-color: #ff0000; color: #ff0000; }
        .rarity-special { border-color: #00ff88; color: #00ff88; }

        .character-card.rarity-common:hover { box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .character-card.rarity-rare:hover { box-shadow: 0 0 15px rgba(74,134,232,0.3); }
        .character-card.rarity-epic:hover { box-shadow: 0 0 20px rgba(153,0,255,0.3); }
        .character-card.rarity-legendary:hover { box-shadow: 0 0 25px rgba(251,188,4,0.4); }
        .character-card.rarity-mythic:hover { box-shadow: 0 0 30px rgba(255,0,0,0.5); }
    </style>
</head>

<body>
    <div id="pageLoading" style="position:fixed;inset:0;background:#0F0F23;display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div class="neon-text" style="color:var(--neon-magenta);font-family:var(--font-heading);font-size:1.5rem;animation:pulse 1.5s infinite;">載入中...</div>
    </div>

    <div class="team-page" id="teamPage" style="display:none;">
        <div class="header-row">
            <a href="index.html" class="back-btn">← 返回大廳</a>
            <div class="stats-bar" id="collectionStats">收集度: 0 / 0 (0%)</div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all')">全部</button>
            <button class="filter-btn" onclick="setFilter('owned')">已擁有</button>
            <button class="filter-btn" onclick="setFilter('unowned')">未擁有</button>
        </div>

        <div class="char-grid" id="charGrid">
            <!-- Rendered by JS -->
        </div>

    </div>

    <script>
        let myProfile = null;
        let allChars = [];
        let currentFilter = 'all';

        AuthManager.init();
        AuthManager.onAuthChanged(async (user) => {
            if (!user) { location.href = 'index.html'; return; }
            myProfile = await UserProfile.getProfile(user.uid);
            
            if (typeof ALL_CHARACTERS !== 'undefined') allChars = ALL_CHARACTERS;
            else if (typeof window.characters !== 'undefined') allChars = window.characters;
            
            renderCollection();
            document.getElementById('pageLoading').style.display = 'none';
            document.getElementById('teamPage').style.display = 'block';
        });

        function setFilter(filt) {
            currentFilter = filt;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderCollection();
        }

        function renderCollection() {
            const grid = document.getElementById('charGrid');
            grid.innerHTML = '';
            
            const ownedNames = myProfile.unlockedCharacters || [];
            document.getElementById('collectionStats').textContent = `收集度: ${ownedNames.length} / ${allChars.length} (${Math.round(ownedNames.length / allChars.length * 100)}%)`;
            
            let displayList = allChars;
            if(currentFilter === 'owned') displayList = displayList.filter(c => ownedNames.includes(c.name));
            if(currentFilter === 'unowned') displayList = displayList.filter(c => !ownedNames.includes(c.name));
            
            // Sort: Owned first, then descending rarity (UPPERCASE matches ALL_CHARACTERS.rarity)
            const rarityOrder = { MYTHIC: 5, LEGENDARY: 4, EPIC: 3, RARE: 2, COMMON: 1, SPECIAL: 0 };
            displayList.sort((a, b) => {
                const aOwned = ownedNames.includes(a.name) ? 1 : 0;
                const bOwned = ownedNames.includes(b.name) ? 1 : 0;
                if (aOwned !== bOwned) return bOwned - aOwned;
                return (rarityOrder[b.rarity] || 0) - (rarityOrder[a.rarity] || 0);
            });
            
            // Rarity label map
            const RARITY_LABEL = { COMMON: '一般', RARE: '稀有', EPIC: '史詩', LEGENDARY: '傳說', MYTHIC: '神話', SPECIAL: '特殊' };

            displayList.forEach(char => {
                const isOwned  = ownedNames.includes(char.name);
                const rClass   = (char.rarity || 'COMMON').toLowerCase();
                const hpDisplay = typeof char.hp === 'object' ? `${char.hp.min}~${char.hp.max}` : char.hp;
                const atkDisplay = typeof char.atk === 'object' ? `${char.atk.min}~${char.atk.max}` : char.atk;
                const rarityName = RARITY_LABEL[char.rarity] || char.rarity;
                
                const card = document.createElement('div');
                card.className = `character-card glass rarity-${rClass} ${isOwned ? 'owned' : 'locked'}`;
                
                card.innerHTML = `
                    <div class="character-header">
                        <span class="character-id">#${char.id}</span>
                        <span class="character-rarity rarity-${rClass}">${rarityName}</span>
                    </div>
                    <div class="character-name">${char.name}</div>
                    <div class="character-stats">
                        <span class="stat"><span class="stat-label stat-hp">❤</span> ${isOwned ? hpDisplay : '???'}</span>
                        <span class="stat"><span class="stat-label stat-atk">⚔</span> ${isOwned ? atkDisplay : '???'}</span>
                    </div>
                    <div class="character-skills">
                        ${isOwned && char.skills && char.skills.length > 0
                        ? char.skills.slice(0, 2).map(s => 
                            `<div class="skill-item"><span class="skill-name">${s.name}</span></div>`
                        ).join('')
                        : '<div class="skill-item" style="color:rgba(255,255,255,0.2);">🔒 未解鎖</div>'}
                        ${isOwned && char.passive 
                        ? `<div class="skill-item" style="color:var(--neon-gold);">[被動] ${char.passive.name}</div>` 
                        : ''}
                    </div>
                `;
                
                card.onclick = () => {
                    if (isOwned) {
                        const skills = (char.skills || []).map(s => `・${s.name}: ${s.desc}`).join('\n');
                        const passive = char.passive ? `\n[被動] ${char.passive.name}: ${char.passive.desc}` : '';
                        alert(`【${char.name}】(${rarityName})\n血量: ${hpDisplay} | 攻擊: ${atkDisplay}\n\n技能:\n${skills || '無'}${passive}`);
                    } else {
                        alert(`尚未解鎖【${char.name}】！\n可透過試煉之路或抽獎獲得。`);
                    }
                };
                
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
