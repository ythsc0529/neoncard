<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹牌 - 通行證</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/userProfile.js"></script>
    <script src="js/data/passData.js"></script>
    <script src="js/ui/soundManager.js"></script>
    <script src="js/core/notificationManager.js"></script>
    <style>
        body {
            background: #0F0F23;
            min-height: 100vh;
            color: var(--text-primary);
        }

        .pass-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--neon-cyan);
            text-decoration: none;
            font-family: var(--font-heading);
            transition: all 0.2s;
        }

        .back-btn:hover {
            
            transform: translateX(-3px);
        }

        .pass-overview {
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(153, 0, 255, 0.1));
            border: 1px solid var(--neon-cyan);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }

        .pass-overview-left {
            flex: 1;
        }

        .pass-overview-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }
        
        .pass-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--neon-cyan);
            margin-bottom: 5px;
            
        }

        .pass-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .pass-progress {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pass-level-badge {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--neon-cyan);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--neon-cyan);
            
        }

        .progress-bar {
            flex: 1;
            height: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Pass Track Layout */
        .pass-track-container {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow-x: auto;
            padding: 10px;
        }

        .track-labels {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-right: 15px;
            border-right: 1px solid var(--glass-border);
        }

        .track-label {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            text-align: right;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            line-height: 1.3;
        }

        .label-premium { color: var(--neon-gold); }
        .label-free { color: var(--text-primary); }

        .track-levels {
            display: flex;
            gap: 15px;
            padding: 10px 0;
            margin-bottom: 0;
        }

        .level-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
        }

        .level-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            z-index: 2;
        }
        
        .level-column.unlocked .level-indicator {
            background: var(--neon-cyan);
            color: #000;
            font-weight: bold;
            border-color: var(--neon-cyan);
            
        }

        .reward-box {
            width: 100px;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reward-box:hover {
            border-color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
        }

        .reward-box.premium {
            border-color: rgba(255,215,0,0.3);
            background: rgba(255,215,0,0.05);
        }

        .reward-box.unlocked {
            border-color: var(--neon-green);
            
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% {  }
            50% {  border-color: var(--neon-green); }
            100% {  }
        }

        .reward-box.claimed {
            opacity: 0.4;
            border-color: var(--glass-border);
            animation: none;
        }

        .reward-box.locked-premium {
            opacity: 0.7;
            border-color: rgba(255, 0, 0, 0.3);
        }
        
        .locked-icon {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .r-icon { font-size: 2rem; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; }
        .r-name { font-size: 0.75rem; color: var(--text-secondary); line-height: 1.2; }

        .reward-icon-img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            );
        }

        .item-icon-inline {
            width: 18px;
            height: 18px;
            vertical-align: middle;
            object-fit: contain;
        }

    </style>
</head>

<body>
    <div id="pageLoading" style="position:fixed;inset:0;background:#0F0F23;display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div class="" style="color:var(--neon-cyan);font-family:var(--font-heading);font-size:1.5rem;animation:pulse 1.5s infinite;">載入中...</div>
    </div>

    <div class="pass-page" id="passPage" style="display:none;">
        <div class="header-row">
            <a href="index.html" class="back-btn">← 返回主選單</a>
            <div style="color:var(--text-muted);font-size:0.9rem;">賽季結束：2026/08/31</div>
        </div>

        <div class="pass-overview">
            <div class="pass-overview-left">
                <div class="pass-title">踢飛．盛宴</div>
                <div class="pass-subtitle">踢飛．起步 (免費) / 踢飛．盛宴 (進階)</div>
                <div class="pass-progress">
                    <div class="pass-level-badge" id="displayLevel">0</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="expFill"></div>
                    </div>
                    <div style="font-size:0.9rem;white-space:nowrap;color:var(--text-secondary);" id="displayExp">0 / 50 積分</div>
                </div>
            </div>
            <div class="pass-overview-right">
                <div id="premiumStatus" style="font-size:0.9rem;color:var(--neon-gold);margin-bottom:5px;"></div>
                <button class="btn btn-gold" id="btnUnlock" style="display:none;" onclick="unlockPremium()">
                    解鎖進階通行證 (需1 <img src="item_pic/通行證兌換券.png" class="item-icon-inline">)
                </button>
            </div>
        </div>

        <div class="pass-track-container">
            <div class="track-labels">
                <div class="track-label label-premium">踢飛．盛宴<br><span style="font-size:0.7rem;color:var(--text-muted);">進階獎勵</span></div>
                <div class="track-label label-free">踢飛．起步<br><span style="font-size:0.7rem;color:var(--text-muted);">免費獎勵</span></div>
            </div>
            <div class="track-levels" id="trackLevels">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script src="js/ui/pass.js"></script>
</body>
</html>
