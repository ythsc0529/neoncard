<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹牌 - 個人檔案</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Russo+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="js/core/auth.js"></script>
    <script src="js/core/userProfile.js"></script>
    <script src="js/core/rankedSystem.js"></script>
    <script src="js/core/friends.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode/html5-qrcode.min.js"></script>
    <style>
        body { background: radial-gradient(circle at center, #1a1a2e 0%, #0F0F23 100%); min-height: 100vh; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
        @keyframes inviteSlideUp {
            from { opacity:0; transform:translateY(40px) scale(0.95); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }
        .profile-page { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--neon-cyan); text-decoration: none; font-family: var(--font-heading); letter-spacing: 1px; font-size: 0.9rem; transition: all 0.2s; margin-bottom: 30px; }
        .back-btn:hover { text-shadow: 0 0 10px var(--neon-cyan); transform: translateX(-3px); }
        .profile-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
        @media (max-width: 700px) { .profile-grid { grid-template-columns: 1fr; } }

        /* Left Panel */
        .profile-card { padding: 30px; text-align: center; }
        .avatar-ring { width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 18px; border: 3px solid var(--neon-cyan); box-shadow: 0 0 20px rgba(0,243,255,0.3); overflow: hidden; background: var(--glass-bg); }
        .avatar-ring img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .profile-name-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; }
        .profile-display-name { font-family: var(--font-heading); font-size: 1.5rem; color: var(--text-primary); }
        .edit-icon { cursor: pointer; color: var(--text-muted); font-size: 0.9rem; transition: color 0.2s; }
        .edit-icon:hover { color: var(--neon-cyan); }
        .profile-edit-input { background: rgba(0,0,0,0.4); border: 1px solid var(--neon-cyan); color: var(--text-primary); border-radius: 6px; padding: 6px 10px; font-family: var(--font-main); font-size: 1rem; width: 100%; text-align: center; outline: none; }
        .fav-chars-title { color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin: 18px 0 10px; }
        .fav-chars-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .fav-char-chip { background: rgba(0,243,255,0.08); border: 1px solid rgba(0,243,255,0.3); border-radius: 20px; padding: 5px 14px; font-size: 0.85rem; color: var(--neon-cyan); cursor: pointer; transition: all 0.2s; }
        .fav-char-chip:hover { background: rgba(0,243,255,0.2); box-shadow: 0 0 10px rgba(0,243,255,0.3); }
        .fav-char-chip.empty { border-style: dashed; color: var(--text-muted); }
        .bio-area { margin-top: 16px; text-align: left; }
        .bio-label { color: var(--text-secondary); font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
        .bio-text { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; cursor: pointer; min-height: 40px; padding: 8px; border-radius: 6px; transition: background 0.2s; }
        .bio-text:hover { background: rgba(255,255,255,0.05); }
        .bio-textarea { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--neon-cyan); color: var(--text-primary); border-radius: 6px; padding: 8px 10px; font-family: var(--font-main); font-size: 0.9rem; resize: vertical; min-height: 70px; outline: none; }
        .save-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn-sm { padding: 7px 16px; font-size: 0.8rem; }
        .logout-btn { margin-top: 20px; width: 100%; border-color: rgba(255,100,100,0.5); color: rgba(255,100,100,0.8); }
        .logout-btn:hover:not(:disabled) { background: rgba(255,100,100,0.1); border-color: #ff4444; color: #ff4444; }
        .meta-row { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--glass-border); text-align: left; }

        /* Right Panel - Tabs */
        .right-panel { display: flex; flex-direction: column; gap: 0; }
        .tabs { display: flex; border-bottom: 1px solid var(--glass-border); margin-bottom: 0; }
        .tab-btn { flex: 1; padding: 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-family: var(--font-main); font-size: 0.9rem; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
        .tab-btn.active { color: var(--neon-cyan); border-bottom-color: var(--neon-cyan); }
        .tab-content { display: none; padding: 20px 0; }
        .tab-content.active { display: block; }
        .friend-list { display: flex; flex-direction: column; gap: 10px; }
        .friend-card { display: flex; flex-direction: column; align-items: stretch; gap: 10px; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; transition: border-color 0.2s; }
        .friend-card:hover { border-color: rgba(0,243,255,0.3); }
        .friend-card-row { display: flex; align-items: center; gap: 14px; }
        .friend-avatar { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 2px solid var(--glass-border); flex-shrink: 0; background: var(--glass-bg); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .friend-info { flex: 1; min-width: 0; }
        .friend-name { font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .friend-bio { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .friend-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .friend-stats-bar { padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 8px; border-top: 1px solid var(--glass-border); display: flex; flex-wrap: wrap; gap: 4px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-input-sm { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: var(--text-primary); border-radius: 8px; padding: 10px 14px; font-family: var(--font-main); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .search-input-sm:focus { border-color: var(--neon-cyan); }
        .search-results { display: flex; flex-direction: column; gap: 8px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .pending-request { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.2); border-radius: 12px; }
        .badge-count { background: var(--neon-pink); color: white; border-radius: 10px; padding: 1px 7px; font-size: 0.75rem; margin-left: 6px; }

        /* Char Picker Modal */
        .char-picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; max-height: 400px; overflow-y: auto; padding: 4px; }
        .char-picker-item { padding: 10px; text-align: center; border-radius: 10px; border: 1px solid var(--glass-border); cursor: pointer; transition: all 0.2s; font-size: 0.85rem; }
        .char-picker-item:hover { border-color: var(--neon-cyan); background: rgba(0,243,255,0.08); }
        .char-picker-item.selected { border-color: var(--neon-gold); background: rgba(255,215,0,0.1); }

        /* QR & Scanner Modals */
        #qrModal .modal, #scannerModal .modal { max-width: 400px; text-align: center; }
        .qr-container { background: white; padding: 15px; border-radius: 12px; display: inline-block; margin: 20px 0; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin: 15px 0; }
        .scan-btn { display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="pageLoading" style="position:fixed;inset:0;background:#0F0F23;display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div class="neon-text" style="color:var(--neon-cyan);font-family:var(--font-heading);font-size:1.5rem;letter-spacing:3px;animation:pulse 1.5s infinite;">載入中...</div>
    </div>

    <div class="profile-page" id="profilePage" style="display:none;">
        <a href="index.html" class="back-btn">← 返回主選單</a>

        <div class="profile-grid">
            <!-- Left: User Card -->
            <div class="profile-card glass" id="userCard">
                <div class="avatar-ring">
                    <div class="avatar-placeholder" id="avatarEmoji">👤</div>
                    <img id="avatarImg" style="display:none;" alt="Avatar">
                </div>

                <!-- Name edit -->
                <div class="profile-name-row" id="nameDisplayRow">
                    <span class="profile-display-name" id="nameDisplay">-</span>
                    <span class="edit-icon" onclick="startEditName()" title="編輯名稱">✏️</span>
                </div>
                <div style="display:none;" id="nameEditRow">
                    <input class="profile-edit-input" id="nameInput" maxlength="12" placeholder="輸入名稱（2-12字）">
                    <p id="nameEditHint" style="color:var(--text-muted);font-size:0.8rem;min-height:18px;margin-top:4px;"></p>
                    <div class="save-row" style="margin-top:8px;">
                        <button class="btn btn-sm" id="saveNameBtn" style="flex:1;border-color:var(--neon-green);color:var(--neon-green);" onclick="saveName()">儲存</button>
                        <button class="btn btn-sm" style="flex:1;opacity:0.6;" onclick="cancelEditName()">取消</button>
                    </div>
                </div>

                <!-- Favorite chars -->
                <div class="fav-chars-title">愛用角色</div>
                <div class="fav-chars-row" id="favCharsRow"></div>

                <!-- Bio -->
                <div class="bio-area">
                    <div class="bio-label">自我介紹</div>
                    <div class="bio-text" id="bioDisplay" onclick="startEditBio()">點擊新增自我介紹...</div>
                    <div style="display:none;" id="bioEditArea">
                        <textarea class="bio-textarea" id="bioInput" maxlength="100" placeholder="寫點什麼...（最多100字）"></textarea>
                        <div class="save-row">
                            <button class="btn btn-sm" style="flex:1;border-color:var(--neon-green);color:var(--neon-green);" onclick="saveBio()">儲存</button>
                            <button class="btn btn-sm" style="flex:1;opacity:0.6;" onclick="cancelEditBio()">取消</button>
                        </div>
                    </div>
                </div>

                <!-- UID -->
                <div class="meta-row">
                    <div class="bio-label">UID</div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div id="uidDisplay" style="color:var(--text-muted);font-size:0.85rem;font-family:monospace;">-</div>
                        <span class="edit-icon" onclick="copyUid()" title="複製 UID" style="font-size:0.8rem;">📋</span>
                        <button class="btn btn-sm" style="margin-left:auto;font-size:0.75rem;padding:5px 10px;border-color:var(--neon-cyan);color:var(--neon-cyan);" onclick="showMyQr()">我的 QR Code</button>
                    </div>
                </div>

                <!-- Join Date -->
                <div class="meta-row">
                    <div class="bio-label">加入日期</div>
                    <div id="joinDateDisplay" style="color:var(--text-muted);font-size:0.85rem;">-</div>
                </div>

                <!-- Ranked Info Section -->
                <div class="meta-row" id="rankedSection" style="display:none;">
                    <div class="bio-label" style="margin-bottom:10px;">🏅 排位資訊</div>
                    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
                        <img id="profileRankImg" src="" alt="rank" style="width:64px;height:64px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(255,215,0,0.4));">
                        <div id="profileRankName" style="font-family:var(--font-heading);font-size:1.1rem;color:var(--neon-gold);"></div>
                        <div id="profileRankStars" style="font-size:1.1rem;letter-spacing:3px;"></div>
                    </div>
                    <div style="margin-top:10px;padding:8px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid var(--glass-border);">
                        <div class="bio-label" style="margin-bottom:3px;">歷史最高</div>
                        <div id="profilePeakRank" style="color:var(--text-secondary);font-size:0.85rem;">-</div>
                    </div>
                </div>

                <!-- Title Selector Section -->
                <div class="meta-row" id="titleSection" style="display:none;">
                    <div class="bio-label" style="margin-bottom:8px;">🎖 當前稱號</div>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <img id="profileTitleImg" src="" alt="title" style="height:32px;object-fit:contain;">
                        <span id="profileTitleName" style="color:var(--neon-gold);font-family:var(--font-heading);font-size:0.95rem;"></span>
                        <button class="btn btn-sm" style="margin-left:auto;font-size:0.75rem;padding:5px 10px;" onclick="openTitlePicker()">更換</button>
                    </div>
                </div>

                <button class="btn logout-btn btn-sm" onclick="handleLogout()">登出</button>
            </div>

            <!-- Right: Tabs -->
            <div class="right-panel glass" style="padding:0;overflow:hidden;">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('friends')" id="tab-friends">好友</button>
                    <button class="tab-btn" onclick="switchTab('search')" id="tab-search">搜尋玩家</button>
                    <button class="tab-btn" onclick="switchTab('pending')" id="tab-pending">
                        待確認 <span class="badge-count hidden" id="pendingBadge">0</span>
                    </button>
                </div>
                <div style="padding: 20px;">
                    <!-- Friends Tab -->
                    <div class="tab-content active" id="tab-content-friends">
                        <div class="friend-list" id="friendList">
                            <div class="empty-state"><div class="icon">👥</div>載入好友中...</div>
                        </div>
                    </div>

                    <!-- Search Tab -->
                    <div class="tab-content" id="tab-content-search">
                        <div class="search-bar">
                            <input class="search-input-sm" id="searchInput" placeholder="輸入玩家名稱或掃描..." onkeyup="if(event.key==='Enter')doSearch()">
                            <button class="btn btn-sm" onclick="doSearch()">搜尋</button>
                            <button class="btn btn-sm btn-magenta scan-btn" onclick="startScanner()">📷 掃描</button>
                        </div>
                        <div class="search-results" id="searchResults">
                            <div class="empty-state"><div class="icon">🔍</div>輸入名稱以搜尋玩家</div>
                        </div>
                    </div>

                    <!-- Pending Tab -->
                    <div class="tab-content" id="tab-content-pending">
                        <div id="pendingList">
                            <div class="empty-state"><div class="icon">📬</div>沒有待確認的好友邀請</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Character Picker Modal -->
    <div class="modal-overlay" id="charPickerModal">
        <div class="modal glass" style="max-width:600px;">
            <h2 style="margin-bottom:16px;">選擇愛用角色（最多3個）</h2>
            <input class="search-input-sm" id="charPickerSearch" placeholder="搜尋角色..." oninput="filterCharPicker(this.value)" style="width:100%;margin-bottom:14px;">
            <div class="char-picker-grid" id="charPickerGrid"></div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button class="btn" style="flex:1;" onclick="saveCharPicker()">確認</button>
                <button class="btn" style="flex:1;opacity:0.6;" onclick="closeCharPicker()">取消</button>
            </div>
        </div>
    </div>

    <!-- Title Picker Modal -->
    <div class="modal-overlay" id="titlePickerModal">
        <div class="modal glass" style="max-width:460px;">
            <h2 style="margin-bottom:16px;">🎖 選擇稱號</h2>
            <div id="titlePickerList" style="display:flex;flex-direction:column;gap:10px;"></div>
            <button class="btn" style="width:100%;margin-top:16px;opacity:0.6;" onclick="closeTitlePicker()">取消</button>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal glass">
            <h2 style="color:var(--neon-cyan);margin-bottom:10px;">我的 QR Code</h2>
            <p style="color:var(--text-secondary);font-size:0.9rem;">讓好友掃描此碼以快速加你為好友</p>
            <div class="qr-container" id="qrcode"></div>
            <div style="color:var(--neon-gold);font-family:monospace;margin-bottom:20px;" id="qrUidText"></div>
            <button class="btn" style="width:100%;opacity:0.7;" onclick="closeQrModal()">關閉</button>
        </div>
    </div>

    <!-- Scanner Modal -->
    <div class="modal-overlay" id="scannerModal">
        <div class="modal glass">
            <h2 style="color:var(--neon-magenta);margin-bottom:10px;">掃描 QR Code</h2>
            <p style="color:var(--text-secondary);font-size:0.9rem;">請將好友的 QR Code 對準鏡頭</p>
            <div id="reader"></div>
            <button class="btn" style="width:100%;opacity:0.7;" onclick="stopScanner()">取消掃描</button>
        </div>
    </div>

    <!-- Char Picker data -->
    <script src="js/data/characters_part1.js"></script>
    <script src="js/data/characters_part2.js"></script>
    <script src="js/data/characters_part3.js"></script>
    <script src="js/data/characters_part4.js"></script>
    <script src="js/data/characters_part5.js"></script>
    <script src="js/data/characters_part6.js"></script>
    <script src="js/data/characters.js"></script>

    <script>
        let myProfile = null;
        let myFriends = [];
        let allCharacters = [];
        let tempFavChars = [];
        let charPickerSlot = -1;

        // Stat mode definitions (shared)
        const STAT_MODES = [
            { key: 'pve',         label: '🤖 PvE', color: 'var(--neon-cyan)' },
            { key: 'online',      label: '🌐 線上', color: 'var(--neon-gold)' },
            { key: 'competitive', label: '🏆 競賽', color: '#ff6b35' }
        ];

        function buildStatsBar(stats) {
            const bits = STAT_MODES.map(m => {
                const s = (stats || {})[m.key] || {};
                const w = s.wins || 0, l = s.losses || 0, total = w + l;
                if (total === 0) return '';
                const pct = Math.round(w / total * 100);
                return `<span style="color:${m.color};font-size:0.78rem;margin-right:10px;">${m.label} <b>${pct}%</b> <span style="color:var(--text-muted);">(${w}勝${l}敗)</span></span>`;
            }).filter(Boolean).join('');
            return bits ? `<div class="friend-stats-bar">${bits}</div>` : '';
        }

        function formatJoinDate(createdAt) {
            if (!createdAt) return '';
            const d = createdAt.toDate ? createdAt.toDate() : new Date(createdAt);
            return d.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        // ── Init ──────────────────────────────────────────────────────
        let _profileInviteTimer = null;
        let _inviteUnsubscribe = null;

        AuthManager.init();
        AuthManager.onAuthChanged(async (user) => {
            if (!user) { location.href = 'index.html'; return; }
            myProfile = await UserProfile.getProfile(user.uid);
            if (!myProfile) { location.href = 'index.html'; return; }
            renderProfile();
            loadFriends();
            loadPending();
            // Listen for game invites even on profile page
            _inviteUnsubscribe = FriendsManager.listenForGameInvites(showProfileGameInvite);
            document.getElementById('pageLoading').style.display = 'none';
            document.getElementById('profilePage').style.display = 'block';
        });

        function showProfileGameInvite(invite) {
            const existing = document.getElementById('profileInviteOverlay');
            if (existing) existing.remove();
            if (_profileInviteTimer) clearInterval(_profileInviteTimer);

            const modeLabel = invite.gameMode === 'quick' ? '快速模式 (3張牌)' : '經典模式 (7張牌)';
            let secsLeft = 45;

            const overlay = document.createElement('div');
            overlay.id = 'profileInviteOverlay';
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(6px);animation:fadeIn 0.25s ease;';
            overlay.innerHTML = `
                <div style="
                    background:linear-gradient(135deg,rgba(15,15,40,0.98),rgba(10,10,30,0.98));
                    border:2px solid var(--neon-gold);border-radius:20px;
                    padding:32px 36px;max-width:400px;width:90%;text-align:center;
                    animation:inviteSlideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
                    box-shadow:0 0 40px rgba(255,215,0,0.3);
                ">
                    <div style="font-size:3.5rem;margin-bottom:12px;animation:pulse 1s infinite;">⚔️</div>
                    <div style="color:var(--text-muted);font-size:0.82rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;">收到對戰邀請</div>
                    <div style="color:var(--neon-gold);font-family:var(--font-heading);font-size:1.8rem;margin-bottom:6px;text-shadow:0 0 20px rgba(255,215,0,0.5);">${escHtml(invite.fromName)}</div>
                    <div style="color:var(--text-secondary);font-size:0.95rem;margin-bottom:24px;">${modeLabel}</div>
                    <div style="display:flex;gap:12px;">
                        <button class="btn btn-gold" style="flex:1;padding:14px;font-size:1rem;" onclick="acceptProfileInvite('${invite.id}','${invite.roomId}','${invite.gameMode}','${escHtml(invite.fromName)}')">✅ 接受對戰</button>
                        <button class="btn" style="flex:1;padding:14px;font-size:1rem;opacity:0.6;" onclick="declineProfileInvite('${invite.id}')">❌ 拒絕</button>
                    </div>
                    <div style="font-size:0.8rem;color:var(--text-muted);margin-top:14px;">邀請將於 <span id="profileInviteCountdown" style="color:var(--neon-cyan);font-weight:700;">${secsLeft}</span> 秒後失效</div>
                </div>`;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if (e.target === overlay) declineProfileInvite(invite.id); });

            _profileInviteTimer = setInterval(() => {
                secsLeft--;
                const el = document.getElementById('profileInviteCountdown');
                if (el) el.textContent = secsLeft;
                if (secsLeft <= 0) {
                    clearInterval(_profileInviteTimer);
                    FriendsManager.clearGameInvite(invite.id).catch(() => {});
                    const ov = document.getElementById('profileInviteOverlay');
                    if (ov) ov.remove();
                }
            }, 1000);
        }

            await UserProfile.updateProfile(myProfile.uid, { displayName: val });

        function openCharPicker(slot) {

            if (allCharacters.length === 0) {
                if (typeof ALL_CHARACTERS !== 'undefined') allCharacters = ALL_CHARACTERS;

        function filterCharPicker(query) {
            const grid = document.getElementById('charPickerGrid');
            grid.innerHTML = '';
            const chars = (allCharacters || []).filter(c => !query || c.name.includes(query));
            chars.slice(0, 80).forEach(c => {
                const div = document.createElement('div');
                div.className = 'char-picker-item' + (tempFavChars.includes(c.name) ? ' selected' : '');
                div.textContent = c.name;
                div.onclick = () => toggleCharPick(c.name, div);
                grid.appendChild(div);
            });
        }
        function toggleCharPick(name, el) {
            const idx = tempFavChars.indexOf(name);
            if (idx >= 0) {
                tempFavChars.splice(idx, 1);
                el.classList.remove('selected');
            } else {
                if (tempFavChars.length >= 3) { alert('最多選3個角色'); return; }
                tempFavChars.push(name);
                el.classList.add('selected');
            }
        }

        // ── Search ────────────────────────────────────────────────────
        async function doSearch() {

            const results = await UserProfile.searchByDisplayName(q);
            const container = document.getElementById('searchResults');
            const me = AuthManager.getCurrentUser();
            if (results.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">😶</div>找不到玩家</div>';

            const rows = await Promise.all(results.map(async (u) => {

                const alreadyFriend = await FriendsManager.isFriend(u.uid);

                const btnHtml = alreadyFriend
                    ? `<span style="color:var(--neon-green);font-size:0.8rem;">✓ 好友</span>`
                    : hasPending
                        ? `<span style="color:var(--text-muted);font-size:0.8rem;">已送出</span>`
                        : `<button class="btn btn-sm" onclick="addFriend('${u.uid}',this)">加好友</button>`;
                const statsBar = buildStatsBar(u.stats);
                const joinStr = u.createdAt ? `<div style="color:var(--text-muted);font-size:0.75rem;margin-top:3px;">📅 ${formatJoinDate(u.createdAt)} 加入</div>` : '';
                return `<div class="friend-card">
                    <div class="friend-card-row">
                        <a href="player.html?uid=${u.uid}" style="text-decoration:none;">

        function escHtml(str) {
            return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function copyUid() {
            const uid = document.getElementById('uidDisplay').textContent;
            if (!uid || uid === '-') return;
            navigator.clipboard.writeText(uid).then(() => {
                const btn = event.currentTarget;
                const oldText = btn.textContent;
                btn.textContent = '✅';
                setTimeout(() => btn.textContent = oldText, 2000);
            }).catch(err => {
                console.error('複製失敗:', err);
                alert('複製失敗，請手動選取複製');
            });
        }

        // ── QR Code & Scanner ─────────────────────────────────────────
        let qrInstance = null;
        let html5QrCode = null;

        function showMyQr() {
            const uid = myProfile?.uid;
            if (!uid) return;
            
            document.getElementById('qrUidText').textContent = uid;
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            new QRCode(qrContainer, {
                text: uid,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
            
            document.getElementById('qrModal').classList.add('active');
        }

        function closeQrModal() {
            document.getElementById('qrModal').classList.remove('active');
        }

        async function startScanner() {
            const scannerModal = document.getElementById('scannerModal');
            scannerModal.classList.add('active');
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onScanSuccess
                );
            } catch (err) {
                console.error("Scanner failed to start:", err);
                alert("無法啟動相機，請確認已授權權限。");
                stopScanner();
            }
        }

        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
            }
            document.getElementById('scannerModal').classList.remove('active');
        }

        async function onScanSuccess(decodedText) {
            console.log("Scan Result:", decodedText);
            await stopScanner();
            
            // Assume the decoded text is the UID
            const targetUid = decodedText.trim();
            if (targetUid.length < 10) { // Typical UID length
                alert("無效的 QR Code");
                return;
            }
            
            // Search by UID
            searchByScannedUid(targetUid);
        }

        async function searchByScannedUid(uid) {
            const container = document.getElementById('searchResults');
            container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div>正在查詢玩家...</div>';
            switchTab('search');
            
            try {
                const u = await UserProfile.getProfile(uid);
                if (!u) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">😶</div>找不到該玩家 (UID: ' + uid + ')</div>';
                    return;
                }
                
                const me = AuthManager.getCurrentUser();
                if (u.uid === me?.uid) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">😊</div>這是你自己哦！</div>';
                    return;
                }
                
                const alreadyFriend = await FriendsManager.isFriend(u.uid);
                const hasPending = await FriendsManager.hasOutgoingRequest(u.uid);
                const btnHtml = alreadyFriend
                    ? `<span style="color:var(--neon-green);font-size:0.8rem;">✓ 好友</span>`
                    : hasPending
                        ? `<span style="color:var(--text-muted);font-size:0.8rem;">已送出</span>`
                        : `<button class="btn btn-sm" onclick="addFriend('${u.uid}',this)">加好友</button>`;
                
                const statsBar = buildStatsBar(u.stats);
                const joinStr = u.createdAt ? `<div style="color:var(--text-muted);font-size:0.75rem;margin-top:3px;">📅 ${formatJoinDate(u.createdAt)} 加入</div>` : '';
                
                container.innerHTML = `
                    <div style="color:var(--neon-cyan);font-size:0.8rem;margin-bottom:10px;letter-spacing:1px;">✨ 掃描成功！已找到玩家：</div>
                    <div class="friend-card">
                        <div class="friend-card-row">
                            <a href="player.html?uid=${u.uid}" style="text-decoration:none;">
                                <div class="friend-avatar">${u.googlePhotoURL ? `<img src="${u.googlePhotoURL}" alt="">` : '👤'}</div>
                            </a>
                            <div class="friend-info">
                                <a href="player.html?uid=${u.uid}" style="text-decoration:none;">
                                    <div class="friend-name" style="cursor:pointer;transition:color 0.2s;" onmouseover="this.style.color='var(--neon-cyan)'" onmouseout="this.style.color=''">${escHtml(u.displayName)}</div>
                                </a>
                                <div class="friend-bio">${escHtml(u.bio || '沒有自我介紹')}</div>
                                ${joinStr}
                            </div>
                            <div class="friend-actions">${btnHtml}</div>
                        </div>
                        ${statsBar}
                    </div>`;
                    
            } catch (err) {
                console.error("Search by UID failed:", err);
                container.innerHTML = '<div class="empty-state"><div class="icon">❌</div>查詢出錯，請稍後再試</div>';
            }
        }
    </script>
</body>
</html>
